<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ版 ヴァンサバライク</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #222; 
            color: #fff; 
            font-family: sans-serif;
            /* スワイプによるリロードなどを防止 */
            overscroll-behavior: none; 
        }
        canvas { 
            display: block; 
            /* キャンバス上でのデフォルトのタッチアクション（スクロールなど）を無効化 */
            touch-action: none; 
        }
        #ui { position: absolute; top: 10px; left: 20px; pointer-events: none; }
        #gameover { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; margin-top: 20px; background-color: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; touch-action: manipulation;}
    </style>
</head>
<body>
    <div id="ui">
        <h3>HP: <span id="hp">100</span></h3>
        <h3>Score: <span id="score">0</span></h3>
    </div>
    <div id="gameover">
        <h1 style="color: #e74c3c; font-size: 40px; margin-bottom: 10px;">GAME OVER</h1>
        <h2>最終スコア: <span id="finalScore">0</span></h2>
        <button onclick="location.reload()">もう一度プレイ</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let isGameOver = false;

        // --- バーチャルジョイスティックの管理 ---
        const joystick = {
            active: false,
            baseX: 0, baseY: 0,
            currentX: 0, currentY: 0,
            dx: 0, dy: 0 // 正規化された方向ベクトル (-1.0 ～ 1.0)
        };

        // タッチイベントの登録
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', endTouch, { passive: false });
        canvas.addEventListener('touchcancel', endTouch, { passive: false });

        function handleTouch(e) {
            e.preventDefault(); // デフォルトのスクロール動作を防止
            const touch = e.touches[0];
            
            if (!joystick.active) {
                joystick.active = true;
                // タッチした場所をジョイスティックの中心にする
                joystick.baseX = touch.clientX;
                joystick.baseY = touch.clientY;
            }
            joystick.currentX = touch.clientX;
            joystick.currentY = touch.clientY;

            // 方向の計算
            let diffX = joystick.currentX - joystick.baseX;
            let diffY = joystick.currentY - joystick.baseY;
            let dist = Math.hypot(diffX, diffY);

            if (dist > 0) {
                joystick.dx = diffX / dist;
                joystick.dy = diffY / dist;
            }
        }

        function endTouch(e) {
            e.preventDefault();
            joystick.active = false;
            joystick.dx = 0;
            joystick.dy = 0;
        }

        // --- プレイヤークラス ---
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.color = '#3498db';
                this.speed = 3.5; // スマホ操作用に少し調整
                this.hp = 100;
                this.attackTimer = 0;
                this.attackInterval = 35; // 攻撃間隔
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                // ジョイスティックの入力で移動
                this.x += joystick.dx * this.speed;
                this.y += joystick.dy * this.speed;

                // 画面外に出ないように制限
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // 自動攻撃のタイマー
                this.attackTimer++;
                if (this.attackTimer >= this.attackInterval) {
                    this.attack();
                    this.attackTimer = 0;
                }
            }

            attack() {
                if (enemies.length === 0) return;
                
                let closestEnemy = null;
                let minDist = Infinity;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closestEnemy = e;
                    }
                }
                
                if (closestEnemy) {
                    let angle = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                    projectiles.push(new Projectile(this.x, this.y, angle));
                }
            }
        }

        // --- 敵クラス ---
        class Enemy {
            constructor() {
                this.radius = 12;
                this.color = '#e74c3c';
                this.speed = 1.0 + Math.random() * 0.8; 
                
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? -30 : canvas.height + 30;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                let angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }
        }

        // --- 弾クラス ---
        class Projectile {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.radius = 6;
                this.color = '#f1c40f';
                this.speed = 8;
                this.angle = angle;
                this.life = 100; 
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life--;
            }
        }

        // --- ジョイスティックの描画 ---
        function drawJoystick() {
            if (!joystick.active) return;
            
            const maxRadius = 40; // 操作範囲の円の大きさ
            
            // ベース（半透明の大きい円）
            ctx.beginPath();
            ctx.arc(joystick.baseX, joystick.baseY, maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fill();
            ctx.closePath();

            // ノブ（現在指がある位置の小さい円）
            let dist = Math.hypot(joystick.currentX - joystick.baseX, joystick.currentY - joystick.baseY);
            let drawDist = Math.min(dist, maxRadius); // 描画位置を最大半径内に制限
            let knobX = joystick.baseX + joystick.dx * drawDist;
            let knobY = joystick.baseY + joystick.dy * drawDist;

            ctx.beginPath();
            ctx.arc(knobX, knobY, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
            ctx.closePath();
        }

        // ゲーム変数の初期化
        let player = new Player(canvas.width / 2, canvas.height / 2);
        let enemies = [];
        let projectiles = [];
        let spawnRate = 60; 
        let frameCount = 0;

        // 当たり判定
        function checkCollisions() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (Math.hypot(p.x - e.x, p.y - e.y) - p.radius - e.radius < 0) {
                        enemies.splice(j, 1);       
                        projectiles.splice(i, 1);   
                        score++;
                        document.getElementById('score').innerText = score;
                        break;
                    }
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (Math.hypot(player.x - e.x, player.y - e.y) - player.radius - e.radius < 0) {
                    player.hp -= 10; 
                    enemies.splice(i, 1); 
                    document.getElementById('hp').innerText = player.hp;
                    
                    if (player.hp <= 0) {
                        isGameOver = true;
                        document.getElementById('finalScore').innerText = score;
                        document.getElementById('gameover').style.display = 'block';
                    }
                }
            }
        }

        // メインループ
        function gameLoop() {
            if (isGameOver) return; 

            // 画面クリア
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー
            player.update();
            player.draw();

            // 敵の生成
            frameCount++;
            if (frameCount % spawnRate === 0) {
                enemies.push(new Enemy());
                if (spawnRate > 15 && score > 0 && score % 10 === 0) {
                    spawnRate -= 2; 
                }
            }

            // 弾
            for (let i = projectiles.length - 1; i >= 0; i--) {
                projectiles[i].update();
                projectiles[i].draw();
                if (projectiles[i].life <= 0) projectiles.splice(i, 1); 
            }

            // 敵
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                enemies[i].draw();
            }

            // UI (ジョイスティック)
            drawJoystick();

            // 当たり判定
            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        // ゲームスタート
        gameLoop();
    </script>
</body>
</html>

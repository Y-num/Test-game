<style>

<script>
let audioCtx=null;const Sound={play:function(t){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const n=audioCtx.currentTime;if(t==='hit'){o.type='square';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(100,n+0.1);g.gain.setValueAtTime(0.1,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1);}else if(t==='explosion'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(10,n+0.2);g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.2);o.start(n);o.stop(n+0.2);}else if(t==='powerup'){o.type='sine';o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(1200,n+0.2);g.gain.setValueAtTime(0.1,n);g.gain.linearRampToValueAtTime(0.01,n+0.2);o.start(n);o.stop(n+0.2);}else if(t==='laser'){o.type='square';o.frequency.setValueAtTime(800,n);o.frequency.exponentialRampToValueAtTime(200,n+0.1);g.gain.setValueAtTime(0.05,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1);}}catch(e){}}};
const ITEM_DEFS={'none':{cat:'none',name:'【空き】',short:'なし'},'main_normal':{cat:'main',name:'ﾉｰﾏﾙﾎﾞｰﾙ',short:'ﾎﾞｰﾙ威力'},'main_rapid':{cat:'main',name:'ﾗﾋﾟｯﾄﾞﾎﾞｰﾙ',short:'ﾎﾞｰﾙ速度'},'main_pierce':{cat:'main',name:'貫通ﾎﾞｰﾙ',short:'ﾎﾞｰﾙ貫通'},'main_exp_rad':{cat:'main',name:'爆発ﾎﾞｰﾙ(広域)',short:'爆発範囲'},'main_exp_dmg':{cat:'main',name:'爆発ﾎﾞｰﾙ(威力)',short:'爆発威力'},'sub_lsr_dmg':{cat:'sub',name:'ﾚｰｻﾞｰ(威力)',short:'ﾚｰｻﾞｰ威力'},'sub_lsr_spd':{cat:'sub',name:'ﾚｰｻﾞｰ(速射)',short:'ﾚｰｻﾞｰ速射'},'sub_lsr_prc':{cat:'sub',name:'ﾚｰｻﾞｰ(貫通)',short:'ﾚｰｻﾞｰ貫通'},'sub_lsr_thk':{cat:'sub',name:'ﾚｰｻﾞｰ(太さ)',short:'ﾚｰｻﾞｰ太さ'},'sub_msl_dmg':{cat:'sub',name:'ﾐｻｲﾙ(威力)',short:'ﾐｻｲﾙ威力'},'sub_msl_spd':{cat:'sub',name:'ﾐｻｲﾙ(速度)',short:'ﾐｻｲﾙ速度'},'sub_msl_rad':{cat:'sub',name:'ﾐｻｲﾙ(範囲)',short:'ﾐｻｲﾙ範囲'},'sub_msl_cnt':{cat:'sub',name:'ﾐｻｲﾙ(弾数)',short:'ﾐｻｲﾙ弾数'},'sub_bomb_req':{cat:'sub',name:'ﾎﾞﾑ(ｺｽﾄ減)',short:'ﾎﾞﾑｺｽﾄ削減'},'opt_rot_cnt':{cat:'opt',name:'回転ﾊﾞﾘｱ(枚数)',short:'回転ﾊﾞﾘｱ数'},'opt_rot_size':{cat:'opt',name:'回転ﾊﾞﾘｱ(ｻｲｽﾞ)',short:'回転ﾊﾞﾘｱ大'},'opt_rot_spd':{cat:'opt',name:'回転ﾊﾞﾘｱ(速度)',short:'回転ﾊﾞﾘｱ速'},'opt_pill_size':{cat:'opt',name:'ﾄｰﾁｶ(ｻｲｽﾞ)',short:'ﾄｰﾁｶｻｲｽﾞ'},'opt_pill_cnt':{cat:'opt',name:'ﾄｰﾁｶ(設置数)',short:'ﾄｰﾁｶ数'},'opt_pill_hp':{cat:'opt',name:'ﾄｰﾁｶ(強度)',short:'ﾄｰﾁｶ強度'},'acc_ball_cnt':{cat:'acc',name:'初期弾数追加',short:'初期弾数'},'acc_sat_hp':{cat:'acc',name:'子機(体力)',short:'子機体力'},'acc_sat_spd':{cat:'acc',name:'子機(移動速度)',short:'子機速度'},'acc_sat_cnt':{cat:'acc',name:'子機(追加)',short:'子機数'},'acc_score_up':{cat:'acc',name:'獲得ﾎﾟｲﾝﾄUP',short:'ﾎﾟｲﾝﾄUP'},'acc_life_up':{cat:'acc',name:'最大ﾗｲﾌUP',short:'最大ﾗｲﾌ'}};
const GACHA_POOL=Object.keys(ITEM_DEFS).filter(k=>k!=='none'&&!k.includes('exp'));
const APPLY_EFFECTS={'main_normal':(l,s)=>{s.mainDmg+=l;},'main_rapid':(l,s)=>{s.mainSpeed+=l*0.5;},'main_pierce':(l,s)=>{s.mainPierce+=l;},'main_exp_rad':(l,s)=>{s.hasExp=true;s.mainExplodeRad+=l*10;},'main_exp_dmg':(l,s)=>{s.hasExp=true;s.mainExplodeDmg+=l;},'sub_lsr_dmg':(l,s)=>{s.lsrDmg+=l;},'sub_lsr_spd':(l,s)=>{s.lsrInterval=Math.max(4,40-l*2);},'sub_lsr_prc':(l,s)=>{s.lsrPierce+=l;},'sub_lsr_thk':(l,s)=>{s.lsrWidth+=l*3;},'sub_msl_dmg':(l,s)=>{s.hasMsl=true;s.mslDmg+=l*2;},'sub_msl_spd':(l,s)=>{s.hasMsl=true;s.mslSpd+=l*0.2;},'sub_msl_rad':(l,s)=>{s.hasMsl=true;s.mslRad+=l*15;},'sub_msl_cnt':(l,s)=>{s.hasMsl=true;s.mslCnt+=l;},'sub_bomb_req':(l,s)=>{s.bombReq-=l;},'opt_rot_cnt':(l,s)=>{s.rotCnt+=l;},'opt_rot_size':(l,s)=>{s.rotSize+=l*2;},'opt_rot_spd':(l,s)=>{s.rotSpd+=l*0.01;},'opt_pill_size':(l,s)=>{s.pillSize+=l*4;},'opt_pill_cnt':(l,s)=>{s.pillCnt+=l;},'opt_pill_hp':(l,s)=>{s.pillHp+=l*2;},'acc_ball_cnt':(l,s)=>{s.accBalls+=l;},'acc_sat_hp':(l,s)=>{s.satHp+=l*2;},'acc_sat_spd':(l,s)=>{s.satSpd+=l*1.5;},'acc_sat_cnt':(l,s)=>{s.satCnt+=l;},'acc_score_up':(l,s)=>{s.scoreMult+=l*0.5;},'acc_life_up':(l,s)=>{s.maxLife+=l;}};
class SaveData{constructor(){this.load();}load(){let d={};try{const s=localStorage.getItem('megabreakout_v30');if(s)d=JSON.parse(s);}catch(e){}this.loadout=d.loadout||{main:'main_normal',sub:'none',option:'none',acc1:'none',acc2:'none'};this.total_points=d.total_points||0;this.analysis_points=d.analysis_points||0;this.item_counts=d.item_counts||{'main_normal':1};this.custom_items=d.custom_items||{};this.synth_items=d.synth_items||{};this.max_manual_layer=d.max_manual_layer||0;this.hard_mode=d.hard_mode||false;['main','sub','option','acc1','acc2'].forEach(slot=>{const id=this.loadout[slot];if(id!=='none'&&!ITEM_DEFS[id]&&!this.custom_items[id]&&!this.synth_items[id])this.loadout[slot]=(slot==='main')?'main_normal':'none';});}save(){try{localStorage.setItem('megabreakout_v30',JSON.stringify(this));}catch(e){}}hasSR(type){for(let k in this.custom_items){if(this.custom_items[k].isSR&&this.custom_items[k].srTypes.includes(type))return true;}return false;}getLevel(id){if(!id||id==='none')return 0;const c=this.item_counts[id]||0;if(c<=0)return 0;let m=20;if(id==='main_pierce'&&!this.hasSR('screw'))m=2;if(id==='sub_msl_cnt'&&!this.hasSR('multi'))m=2;if(id==='opt_pill_cnt'&&!this.hasSR('invar'))m=2;return Math.min(m,Math.floor(Math.log2(c))+1);}}
const save=new SaveData();
function calcCurrentStats(){let s={mainDmg:1,mainPierce:0,hasExp:false,mainExplodeRad:40,mainExplodeDmg:1,mainSpeed:4,lsrInterval:40,lsrPierce:0,lsrWidth:4,lsrDmg:1,hasMsl:false,mslCnt:1,mslSpd:1.0,mslRad:50,mslDmg:1,satCnt:0,satHp:1,satSpd:2,accBalls:0,bombReq:20,rotCnt:0,rotSize:8,rotSpd:0.05,pillCnt:0,pillSize:30,pillHp:1,scoreMult:1.0,maxLife:3,uncapPierce:false,uncapMsl:false,uncapPill:false,hasSrHeal:false,srHealLvl:0,paddleSpdBonus:0,totalDemerit:0};try{['main','sub','option','acc1','acc2'].forEach(sl=>{const id=save.loadout[sl];if(id==='none')return;let c=sl.replace(/\d/,'');if(c==='option')c='opt';if(save.custom_items[id]||save.synth_items[id]){const i=save.custom_items[id]||save.synth_items[id];const lv=Number(i.level)||1;(i.effects||[]).forEach(ef=>{if(ITEM_DEFS[ef.type]){const aL=(Number(ef.level)||0)*lv;if(aL!==0){if(c==='opt'||c==='acc'||ITEM_DEFS[ef.type].cat===c||i.cat==='mix'||i.isSR)APPLY_EFFECTS[ef.type](aL,s);}}});if(i.isSR){if(i.demerit>0)s.totalDemerit+=i.demerit;if((i.srTypes||[]).includes('heal')){s.hasSrHeal=true;s.srHealLvl+=lv;}if((i.srTypes||[]).includes('screw'))s.uncapPierce=true;if((i.srTypes||[]).includes('multi'))s.uncapMsl=true;if((i.srTypes||[]).includes('invar'))s.uncapPill=true;}}else{const lv=save.getLevel(id);if(APPLY_EFFECTS[id])APPLY_EFFECTS[id](lv,s);}});if(s.totalDemerit>0){s.paddleSpdBonus-=s.totalDemerit;s.mainDmg-=s.totalDemerit;s.scoreMult-=(s.totalDemerit/100);s.maxLife-=s.totalDemerit;}if(!s.uncapPierce)s.mainPierce=Math.min(2,s.mainPierce);if(!s.uncapMsl)s.mslCnt=Math.min(2,s.mslCnt);if(!s.uncapPill)s.pillCnt=Math.min(2,s.pillCnt);s.maxLife=Math.max(1,s.maxLife);s.mslSpd=Math.max(0.1,s.mslSpd);s.scoreMult=Math.max(0.1,s.scoreMult);s.mainDmg=Math.max(0.1,s.mainDmg);}catch(e){}return s;}

        let iNm=(iA.id==='main_normal'||iB.id==='main_normal');let iMl=(iA.id.startsWith('sub_msl')||iB.id.startsWith('sub_msl'));
        if(iA.isBase&&iB.isBase){
            if(iNm&&iMl){save.synth_items[nI]={id:nI,cat:'main',name:`【爆発】エクスプロード`,effects:[{type:'main_exp_rad',level:1},{type:'main_exp_dmg',level:1}],level:1};cs();msg="爆発ボールを作成しました！";}
            else{if(iA.level<5||iB.level<5)return alert("ガチャ装備はLv5以上同士である必要があります");save.synth_items[nI]={id:nI,cat:'mix',name:`【合】${ITEM_DEFS[idA].short}&${ITEM_DEFS[idB].short}`,effects:[{type:idA,level:1},{type:idB,level:1}],level:1};cs();msg="新たな合成装備【Lv.1】を作成しました！";}
        }else if(iA.isSR&&iB.isSR){
            let tA=(iA.srTypes||[]).slice().sort().join();let tB=(iB.srTypes||[]).slice().sort().join();
            if(tA===tB){
                if(iA.demerit>0||iB.demerit>0){save.custom_items[idA].demerit=Math.max(0,iA.demerit-10);if(iB.isBase)save.item_counts[idB]=0;else delete save.custom_items[idB];msg="SR装備を合成し、呪いを10軽減しました！";}
                else{if(iA.level!==iB.level)return alert("同種SRは同レベル同士である必要があります");save.custom_items[idA].level+=iB.level;if(iB.isBase)save.item_counts[idB]=0;else delete save.custom_items[idB];msg=`SR装備を強化し、Lv.${save.custom_items[idA].level}になりました！`;}
            }else{
                if(iA.level<10||iB.level<10)return alert("異なるSR装備はLv10以上同士である必要があります");
                let cEf=[];[...iA.effects,...iB.effects].forEach(ef=>{if(!cEf.find(e=>e.type===ef.type))cEf.push({type:ef.type,level:1});});
                save.custom_items[nI]={id:nI,isSR:true,cat:'sr',srTypes:[...new Set([...iA.srTypes,...iB.srTypes])],name:`【合】複合SR`,effects:cEf,level:1,demerit:0};cs();msg="異なるSRを合成し、新たな複合SR【Lv.1】を作成しました！";
            }
        }else if(!iA.isBase&&!iB.isBase&&!iA.isSR&&!iB.isSR){
            let eA=JSON.stringify(iA.effects.map(e=>e.type).sort());let eB=JSON.stringify(iB.effects.map(e=>e.type).sort());
            if(eA===eB){
                let t=save.synth_items[idA]||save.custom_items[idA];t.level+=iB.level;if(save.synth_items[idB])delete save.synth_items[idB];else delete save.custom_items[idB];msg=`装備を加算強化し、Lv.${t.level}になりました！`;
            }else{
                if(iA.level<10||iB.level<10)return alert("異なる構成の合成はLv10以上同士である必要があります");
                let cEf=[];[...iA.effects,...iB.effects].forEach(ef=>{if(!cEf.find(e=>e.type===ef.type))cEf.push({type:ef.type,level:1});});save.synth_items[nI]={id:nI,cat:'mix',name:`【真合】複合兵装`,effects:cEf,level:1};cs();msg="異なる装備を融合し、新たな複合装備【Lv.1】を作成しました！(効果Lvは1になります)";
            }
        }else{
            if(iA.level<10||iB.level<10)return alert("異なる種類の装備(SRや合成等)はLv10以上同士である必要があります");
            let srT=[...new Set([...(iA.srTypes||[]),...(iB.srTypes||[])])];let isS=srT.length>0;let cEf=[];
            [...iA.effects,...iB.effects].forEach(ef=>{if(!cEf.find(e=>e.type===ef.type))cEf.push({type:ef.type,level:1});});
            let tg=isS?save.custom_items:save.synth_items;
            tg[nI]={id:nI,cat:isS?'sr':'mix',isSR:isS,srTypes:srT,name:isS?'【合】複合SR':'【真合】複合兵装',effects:cEf,level:1,demerit:0};
            cs();msg="装備を融合し、新たな装備【Lv.1】を作成しました！";
        }
        ['main','sub','option','acc1','acc2'].forEach(sl=>{if(save.loadout[sl]===idA||save.loadout[sl]===idB)save.loadout[sl]='none';});
        Sound.play('powerup');synthSelected=[];save.save();window.refreshSynthList();setTimeout(()=>alert(msg),100);
    }catch(e){}
};

window.pullGacha=function(blk){const c=300;if(save.total_points<c)return alert("ポイント不足");let pL=GACHA_POOL.filter(i=>save.getLevel(i)<20);if(pL.length===0)return alert("全カンスト済");let p=blk?Math.floor(save.total_points/c):1;save.total_points-=p*c;let lI="";for(let i=0;i<p;i++){pL=GACHA_POOL.filter(i=>save.getLevel(i)<20);if(pL.length===0)break;let id=pL[Math.floor(Math.random()*pL.length)];save.item_counts[id]=(save.item_counts[id]||0)+1;lI=ITEM_DEFS[id].name;}Sound.play('powerup');save.save();window.showEquipMenu(blk?`${p}回引きました`:`★ ${lI} GET!`);};
window.openDev=function(){eId('equip-layer').classList.add('hidden');eId('dev-modal').classList.remove('hidden');};
window.execDev=function(t){if((save.analysis_points||0)<100)return alert("解析ポイントが足りません(100AP必要)");save.analysis_points-=100;let id='sr_'+t+'_'+Date.now();let nm,ef;if(t==='heal'){nm='生命の器';ef=[];}if(t==='screw'){nm='スクリューボール';ef=[{type:'main_pierce',level:3}];}if(t==='multi'){nm='マルチミサイル';ef=[{type:'sub_msl_cnt',level:3}];}if(t==='invar'){nm='インバ要塞';ef=[{type:'opt_pill_cnt',level:3}];}save.custom_items[id]={id:id,isSR:true,cat:'sr',srTypes:[t],name:'【SR】'+nm,effects:ef,level:1,demerit:100};save.save();Sound.play('powerup');alert(`【SR】${nm} を開発しました！\n(初期は強烈な呪いがあります)`);eId('ap-label').innerText=`解析P: ${save.analysis_points} AP`;};
window.onload=function(){try{window.game=new Game();}catch(e){}};
</script>

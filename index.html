<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Ball Factory & Launcher</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #factory-menu { position: absolute; bottom: 20px; width: 100%; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Distance: <span id="dist">0</span>m</h2>
        <p>ボールをスワイプして飛ばそう！</p>
    </div>

    <div id="factory-menu">
        <button onclick="setMass(0.5)">軽量ボール</button>
        <button onclick="setMass(5.0)">重量ボール</button>
        <button onclick="resetBall()">リセット</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0); // 地球の重力

        // --- 照明 ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 地面 ---
        const groundGeo = new THREE.PlaneGeometry(100, 1000);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        scene.add(groundMesh);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- ボール ---
        let ballRadius = 0.5;
        const ballGeo = new THREE.SphereGeometry(ballRadius);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const ballMesh = new THREE.Mesh(ballGeo, ballMat);
        scene.add(ballMesh);

        const ballBody = new CANNON.Body({
            mass: 1,
            shape: new CANNON.Sphere(ballRadius),
            position: new CANNON.Vec3(0, 1, 0)
        });
        world.addBody(ballBody);

        // --- 操作ロジック ---
        let isDragging = false;
        let startPos = { x: 0, y: 0 };

        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            const endPos = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            
            const dx = (endPos.x - startPos.x) * 0.05;
            const dy = (startPos.y - endPos.y) * 0.1; // 上方向の力
            
            ballBody.velocity.set(dx, dy, -15); // 奥に向かって飛ばす
            isDragging = false;
        });

        // --- グローバル関数 (UI用) ---
        window.setMass = (m) => {
            ballBody.mass = m;
            ballBody.updateMassProperties();
            alert("重さを " + m + " に変更しました！");
        };

        window.resetBall = () => {
            ballBody.position.set(0, 1, 0);
            ballBody.velocity.set(0, 0, 0);
            ballBody.angularVelocity.set(0, 0, 0);
        };

        // --- ループ処理 ---
        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep(); // 物理計算

            // 物理位置をビジュアルに反映
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            // カメラをボールに追従
            camera.position.set(ballBody.position.x, ballBody.position.y + 2, ballBody.position.z + 10);
            
            // 距離計
            document.getElementById('dist').innerText = Math.max(0, -ballBody.position.z).toFixed(1);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
